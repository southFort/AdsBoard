<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="footer">
    <footer class="site-footer">
        <div class="container">
            <div class="footer-content">
                <div class="cooter-section">
                    <h4>AdsBoard</h4>
                    <p>Доска объявлений для ваших товаров и услуг</p>
                </div>

                <div class="footer-section">
                    <h4>Навигация</h4>
                    <ul class="footer-links">
                        <li><a th:href="@{/}">Главная</a> </li>
                        <li><a th:href="@{/ads}">Объявления</a> </li>
                        <li><a th:href="@{/categories}">Категории</a> </li>
                        <li><a th:href="@{/cities}">Города</a> </li>
                    </ul>
                </div>

                <div class="footer-section">
                    <h4>Пользователи</h4>
                    <ul class="footer-links">
                        <li sec:authorize="!isAuthenticated()">
                            <a th:href="@{/login}">Вход</a>
                        </li>
                        <li sec:authorize="!isAuthenticated()">
                            <a th:href="@{/register}">Регистрация</a>
                        </li>
                        <li sec:authorize="isAuthenticated()">
                            <a th:href="@{/my-ads}">Мои объявления</a>
                        </li>
                        <li sec:authorize="isAuthenticated()">
                            <a th:href="@{/logout}">Выход</a>
                        </li>
                    </ul>
                </div>

                <div class="footer-bootom">
                    <p>&copy; <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy')}">2026</span> AdsBoard. Все права защищены. </p>
                    <ul class="footer-legal">
                        <li><a th:href="@{/privacy}">Политика конфиденциальности</a></li>
                        <li><a th:href="@{/terms}">Условия использования</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </footer>
</th:block>
</body>
</html>
