<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Мои объявления</title>
    <link th:href="@{/css/main.css}" rel="stylesheet">
</head>
<body>
<header th:replace="~{fragments/header :: header}"></header>

<main class="container">
    <div class="page-header">
        <h1>Мои объявления</h1>
        <a th:href="@{/ads/create}" class="btn btn-primary">+ Создать объявление</a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <table class="ads-table">
        <thead>
        <tr>
            <th>Заголовок</th>
            <th>Цена</th>
            <th>Категория</th>
            <th>Статус</th>
            <th>Просмотры</th>
            <th>Дата</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="ad : ${ads.content}">
            <td th:text="${ad.title}">Заголовок</td>
            <td th:text="${#number.formatDecimal(ad.price, 0, 'COMMA', 2, 'POINT')} + ' ₽'">Цена</td>
            <td th:text="${ad.category.name}">Категория</td>
            <td th:text="${ad.status.name}">Статус</td>
            <td th:text="${ad.viewsCount}">0</td>
            <td th:text="${#temporals.format(ad.createdAt, 'dd.MM.yyyy')}">Дата</td>
            <td>
                <a th:href="@{/ads/edit/{id}(id=${ad.id})}" class="btn btn-sm">Редактировать</a>
                <form th:action="@{/ads/delete/{id}(id=${ad.id})}" method="post" style="display:inline;"
                      onsubmit="return confirm('Вы уверены?')">
                    <button type="submit" class="btn btn-sm btn-danger">Удалить</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="pagination" th:if="${ads.totelPages > 1}">
        <a th:if="${ads.hasPrevious()}"
           th:href="@{/my-ads(page=@{ads.number - 1}})}"
           class="btn"><<< Назад</a>
        <span>Страница <span th:text="${ads.number + 1}">1</span> из <span th:text="${ads.totelPages}">1</span></span>
        <a th:if="${ads.hasNext()}"
           th:href="@{/my-ads(page=@{ads.number + 1}})}"
           class="btn">Вперед >>></a>
    </div>

    <footer th:replace="fragments/footer :: footer"></footer>
</main>
</body>
</html>
